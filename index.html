<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
      cursor: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: white;
    }

    body {
      position: relative;
    }

    .cursor-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      position: fixed;
      top: 0;
      left: 0;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 9999;
      box-shadow:
        0 0 10px rgba(255,255,255,0.95),
        0 0 20px rgba(255,255,255,0.8),
        0 0 35px rgba(255,255,255,0.55);
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: #000;
    }

    .enter-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(4px);
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .enter-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .enter-text {
      font-size: clamp(1.2rem, 3vw, 2rem);
      letter-spacing: 0.08em;
      color: #fff;
      text-shadow:
        0 0 10px rgba(255,255,255,0.9),
        0 0 22px rgba(255,255,255,0.55);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.75;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.03);
      }
    }

    .site {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 0.9s ease, transform 0.9s ease;
      padding: 24px;
    }

    .site.show {
      opacity: 1;
      transform: scale(1);
    }

    .wrap {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .name {
      font-size: clamp(3.3rem, 8vw, 5rem);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 10px;
      color: #fff;
      text-shadow:
        0 0 10px rgba(255,255,255,0.95),
        0 0 24px rgba(255,255,255,0.6),
        0 0 42px rgba(255,255,255,0.28);
    }

    .bio {
      font-size: 1.55rem;
      font-weight: 700;
      color: #f4f4f4;
      margin-bottom: 16px;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .location {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      color: #e8e8e8;
      margin-bottom: 30px;
      opacity: 0.95;
    }

    .profile-card {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px;
      border-radius: 28px;
      background: rgba(20,20,20,0.74);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 10px 30px rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      margin-bottom: 28px;
    }

    .avatar {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: #050505;
      border: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .avatar::after {
      content: "";
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ff4d5a;
      box-shadow: 0 0 10px rgba(255,77,90,0.7);
    }

    .profile-info {
      text-align: left;
      flex: 1;
    }

    .username {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .status {
      font-size: 0.98rem;
      color: #c8c8c8;
      opacity: 0.85;
    }

    .socials {
      display: flex;
      gap: 16px;
      margin-bottom: 26px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .social-btn {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.9rem;
      box-shadow:
        0 0 18px rgba(255,255,255,0.14),
        0 0 30px rgba(255,255,255,0.08);
      transition: 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .social-btn:hover {
      transform: translateY(-3px) scale(1.05);
      background: rgba(255,255,255,0.1);
      box-shadow:
        0 0 22px rgba(255,255,255,0.24),
        0 0 36px rgba(255,255,255,0.14);
    }

    .views {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #f0f0f0;
      font-size: 1.05rem;
      margin-bottom: 18px;
      opacity: 0.9;
    }

    .player {
      width: 100%;
      max-width: 620px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
    }

    .cover {
      width: 82px;
      height: 82px;
      border-radius: 16px;
      background: rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .player-main {
      flex: 1;
      text-align: left;
    }

    .song {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .timeline-row {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #d9d9d9;
      font-size: 0.95rem;
      margin-top: 4px;
    }

    .bar {
      flex: 1;
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.28);
      position: relative;
      overflow: hidden;
    }

    .bar::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 22%;
      background: #fff;
      border-radius: 999px;
      box-shadow: 0 0 12px rgba(255,255,255,0.85);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 1.8rem;
      color: white;
      margin-left: 12px;
    }

    .control-btn {
      opacity: 0.95;
      user-select: none;
    }

    .small-glow {
      text-shadow:
        0 0 8px rgba(255,255,255,0.8),
        0 0 18px rgba(255,255,255,0.35);
    }

    @media (max-width: 700px) {
      .player {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }

      .player-main {
        text-align: center;
      }

      .controls {
        justify-content: center;
        margin-left: 0;
      }

      .profile-card {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="cursor-dot" id="cursorDot"></div>

  <div class="enter-screen" id="enterScreen">
    <div class="enter-text">click to enter</div>
  </div>

  <main class="site" id="site">
    <div class="wrap">
      <h1 class="name">Silent</h1>
      <div class="bio">nerf life pls</div>

      <div class="location">
        <span>📍</span>
        <span>United States</span>
      </div>

      <div class="profile-card">
        <div class="avatar"></div>
        <div class="profile-info">
          <div class="username">.silent_kys</div>
          <div class="status">currently doing nothing</div>
        </div>
      </div>

      <div class="socials">
        <a class="social-btn" href="#" title="Discord">💬</a>
        <a class="social-btn" href="#" title="Cash App">$</a>
        <a class="social-btn" href="#" title="YouTube">▶</a>
      </div>

      <div class="views">
        <span>👁</span>
        <span>334</span>
      </div>

      <div class="player">
        <div class="cover">🎵</div>

        <div class="player-main">
          <div class="song">j</div>
          <div class="timeline-row">
            <span>0:07</span>
            <div class="bar"></div>
            <span>2:21</span>
          </div>
        </div>

        <div class="controls">
          <span class="control-btn small-glow">⏮</span>
          <span class="control-btn small-glow">⏸</span>
          <span class="control-btn small-glow">⏭</span>
        </div>
      </div>
    </div>
  </main>

  <script>
    const cursor = document.getElementById("cursorDot");

    window.addEventListener("mousemove", (e) => {
      cursor.style.left = e.clientX + "px";
      cursor.style.top = e.clientY + "px";
    });

    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");

    let stars = [];
    let starCount = 220;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      createStars();
    }

    function createStars() {
      stars = [];
      for (let i = 0; i < starCount; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.8 + 0.2,
          a: Math.random() * 0.9 + 0.1,
          speed: Math.random() * 0.18 + 0.02
        });
      }
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const star of stars) {
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${star.a})`;
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();

        star.y += star.speed;
        if (star.y > canvas.height) {
          star.y = -2;
          star.x = Math.random() * canvas.width;
        }
      }

      requestAnimationFrame(drawStars);
    }

    resizeCanvas();
    drawStars();
    window.addEventListener("resize", resizeCanvas);

    const enterScreen = document.getElementById("enterScreen");
    const site = document.getElementById("site");

    enterScreen.addEventListener("click", () => {
      enterScreen.classList.add("hidden");
      site.classList.add("show");
    });
  </script>
</body>
</html>
