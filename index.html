<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silent</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, sans-serif;
      cursor: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
    }

    body {
      position: relative;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: #000;
    }

    .cursor-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      position: fixed;
      top: 0;
      left: 0;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 9999;
      box-shadow:
        0 0 10px rgba(255,255,255,0.95),
        0 0 22px rgba(255,255,255,0.8),
        0 0 40px rgba(255,255,255,0.4);
    }

    .enter-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(4px);
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .enter-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .enter-text {
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      color: #fff;
      letter-spacing: 0.08em;
      text-shadow:
        0 0 10px rgba(255,255,255,0.9),
        0 0 22px rgba(255,255,255,0.45);
      animation: pulse 1.8s ease-in-out infinite;
      user-select: none;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.75;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.03);
      }
    }

    .site {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 0.9s ease, transform 0.9s ease;
      padding: 24px;
    }

    .site.show {
      opacity: 1;
      transform: scale(1);
    }

    .wrap {
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .name {
      font-size: clamp(3.5rem, 8vw, 5.5rem);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 10px;
      text-shadow:
        0 0 10px rgba(255,255,255,0.9),
        0 0 24px rgba(255,255,255,0.5),
        0 0 45px rgba(255,255,255,0.2);
    }

    .bio {
      font-size: 1.45rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: #f2f2f2;
    }

    .location {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.05rem;
      color: #efefef;
      margin-bottom: 28px;
      opacity: 0.95;
    }

    .profile-card {
      width: 100%;
      max-width: 430px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px;
      border-radius: 28px;
      background: rgba(18,18,18,0.72);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 10px 30px rgba(0,0,0,0.55),
        inset 0 0 0 1px rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      margin-bottom: 26px;
    }

    .avatar {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: #050505;
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
      flex-shrink: 0;
    }

    .avatar::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ff4f5f;
      bottom: 6px;
      right: 6px;
      box-shadow: 0 0 10px rgba(255,79,95,0.75);
    }

    .profile-info {
      text-align: left;
      flex: 1;
    }

    .username {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #fff;
    }

    .status {
      font-size: 0.98rem;
      color: #d2d2d2;
      opacity: 0.85;
    }

    .socials {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .social-btn {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.9rem;
      box-shadow:
        0 0 18px rgba(255,255,255,0.14),
        0 0 30px rgba(255,255,255,0.08);
      transition: 0.2s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      outline: none;
    }

    button.social-btn {
      appearance: none;
      -webkit-appearance: none;
    }

    .social-btn:hover {
      transform: translateY(-3px) scale(1.05);
      background: rgba(255,255,255,0.1);
      box-shadow:
        0 0 22px rgba(255,255,255,0.24),
        0 0 36px rgba(255,255,255,0.14);
    }

    . {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      color: #f0f0f0;
      opacity: 0.92;
      margin-bottom: 18px;
    }

    .player {
      width: 100%;
      max-width: 720px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 4px;
    }

    .cover {
      width: 84px;
      height: 84px;
      border-radius: 18px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      color: white;
      flex-shrink: 0;
    }

    .player-main {
      flex: 1;
      text-align: left;
    }

    .song {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .timeline-row {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #d8d8d8;
      font-size: 0.95rem;
    }

    .bar {
      flex: 1;
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.28);
      position: relative;
      overflow: hidden;
    }

    .bar::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 22%;
      background: #fff;
      border-radius: 999px;
      box-shadow: 0 0 12px rgba(255,255,255,0.8);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 1.7rem;
      color: white;
      margin-left: 8px;
      user-select: none;
    }

    .control-btn {
      text-shadow:
        0 0 8px rgba(255,255,255,0.75),
        0 0 18px rgba(255,255,255,0.25);
    }

    @media (max-width: 720px) {
      .player {
        flex-direction: column;
        align-items: stretch;
      }

      .player-main {
        text-align: center;
      }

      .controls {
        justify-content: center;
        margin-left: 0;
      }

      .timeline-row {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="cursor-dot" id="cursorDot"></div>

  <div class="enter-screen" id="enterScreen">
    <div class="enter-text">click to enter</div>
  </div>

  <main class="site" id="site">
    <div class="wrap">
      <h1 class="name">Silent</h1>
      <div class="bio">nerf life pls</div>

      <div class="location">
        <span>📍</span>
        <span>United States</span>
      </div>

      <div class="profile-card">
        <div class="avatar"></div>
        <div class="profile-info">
          <div class="username">.silent_kys</div>
          <div class="status">currently doing nothing</div>
        </div>
      </div>

      <div class="socials">
        <a class="social-btn" href="https://discord.com/users/YOUR_DISCORD_ID" target="_blank" rel="noopener noreferrer" title="Discord">💬</a>
        <button class="social-btn" onclick="noLink('Cash App')" title="Cash App">$</button>
        <button class="social-btn" onclick="noLink('YouTube')" title="YouTube">▶</button>
      </div>

      <div class="">
        <span></span>
        <span></span>
      </div>

      <div class="player">
        <div class="cover">🎵</div>

        <div class="player-main">
          <div class="song">j</div>
          <div class="timeline-row">
            <span>0:07</span>
            <div class="bar"></div>
            <span>2:21</span>
          </div>
        </div>

        <div class="controls">
          <span class="control-btn">⏮</span>
          <span class="control-btn">⏸</span>
          <span class="control-btn">⏭</span>
        </div>
      </div>
    </div>
  </main>

  <script>
    function noLink(name) {
      alert("I don't have " + name + " yet.");
    }

    const cursor = document.getElementById("cursorDot");

    window.addEventListener("mousemove", (e) => {
      cursor.style.left = e.clientX + "px";
      cursor.style.top = e.clientY + "px";
    });

    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");

    let stars = [];
    const starCount = 220;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      createStars();
    }

    function createStars() {
      stars = [];
      for (let i = 0; i < starCount; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.8 + 0.2,
          a: Math.random() * 0.9 + 0.1,
          speed: Math.random() * 0.18 + 0.02
        });
      }
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const star of stars) {
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${star.a})`;
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();

        star.y += star.speed;

        if (star.y > canvas.height) {
          star.y = -2;
          star.x = Math.random() * canvas.width;
        }
      }

      requestAnimationFrame(drawStars);
    }

    resizeCanvas();
    drawStars();
    window.addEventListener("resize", resizeCanvas);

    const enterScreen = document.getElementById("enterScreen");
    const site = document.getElementById("site");

    enterScreen.addEventListener("click", () => {
      enterScreen.classList.add("hidden");
      site.classList.add("show");
    });
  </script>
</body>
</html>
